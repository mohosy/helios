<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helios</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <p class="eyebrow">Energy Systems Console</p>
        <h1>Helios</h1>
        <p class="desc">Optimize battery dispatch against solar production and demand to minimize peak grid draw.</p>

        <div class="card">
          <h2>Scenario</h2>
          <label>Solar Capacity (MW)
            <input id="solar" type="range" min="20" max="180" step="5" value="95" />
            <span id="solarVal">95</span>
          </label>
          <label>Battery Capacity (MWh)
            <input id="battery" type="range" min="20" max="220" step="5" value="120" />
            <span id="batteryVal">120</span>
          </label>
          <label>Grid Price Volatility
            <input id="vol" type="range" min="0.1" max="1" step="0.01" value="0.46" />
            <span id="volVal">0.46</span>
          </label>
          <div class="row">
            <button id="simulate">Simulate</button>
            <button id="stress">Stress Test</button>
          </div>
        </div>

        <div class="card metrics">
          <h2>Outcomes</h2>
          <p>Peak Grid Draw: <strong id="peak">0 MW</strong></p>
          <p>Total Grid Energy: <strong id="energy">0 MWh</strong></p>
          <p>Estimated Cost: <strong id="cost">$0</strong></p>
          <p>Self-sufficiency: <strong id="self">0%</strong></p>
        </div>
      </section>

      <section class="viz">
        <article class="card">
          <h2>24h Dispatch Timeline</h2>
          <canvas id="timeline" width="1080" height="380"></canvas>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
